<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Kind - Plant-Based Nutrition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <img src="Logo x slogan.png" alt="Iron Kind" class="logo">

            <h1>Plant-based nutrition<br>for those who value<br>ethics and results.</h1>

            <p class="tagline">Launching Fall '26</p>

            <p class="subtext">Sign up to receive 20% off at launch.</p>

            <p class="footnote">100% human design.</p>

            <form id="emailForm">
                <div class="form-group">
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required
                    >
                    <button type="submit" class="submit-btn">Sign Up</button>
                </div>
                <p id="formMessage" class="form-message"></p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

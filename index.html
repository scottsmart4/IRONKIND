<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRONKIND | Run on plants.</title>
    <link rel="icon" type="image/png" href="IRONKIND_Favicon_Final_Green.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <img src="IRONKIND_Avatar_Decal_White.png" alt="IRONKIND" class="logo">

            <h1>Plant-based nutrition<br>for those who value<br>ethics and results.</h1>

            <p class="tagline">Launching Fall '26.</p>

            <p class="subtext">Sign up to receive 20% off at launch.</p>

            <form id="emailForm">
                <div class="form-group">
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required
                    >
                    <button type="submit" class="submit-btn">Sign Up</button>
                </div>
                <p id="formMessage" class="form-message"></p>
            </form>

        </div>

        <div class="bottom-section">
            <img src="IRONKIND_Run-on-plants_Cropped.png" alt="Run on plants." class="bottom-image">
            <p class="footnote">100% human design.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
